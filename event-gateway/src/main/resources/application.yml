server:
  port: 8080

spring:
  application:
    name: event-gateway

  # Propagate trace context across the blocking → reactive (WebClient/Netty) boundary,
  # so the outbound Account Service call carries the traceparent header.
  reactor:
    context-propagation: auto

  # Present both spring-web (servlet) and spring-webflux (for WebClient). With both
  # on the classpath Spring Boot starts as a servlet (Tomcat) app; WebClient is used
  # only for the outbound Account Service call.
  main:
    web-application-type: servlet

  datasource:
    url: jdbc:h2:mem:eventdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: none            # schema owned by schema.sql, not Hibernate
    open-in-view: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: always              # run schema.sql on startup

  jackson:
    deserialization:
      use-big-decimal-for-floats: true   # money never passes through double

# Structured JSON logs (ECS): @timestamp, log.level, service.name, trace.id, span.id, message.
logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: event-gateway

# Account Service location — overridden by env (ACCOUNT_SERVICE_BASE_URL) under Docker.
account-service:
  base-url: ${ACCOUNT_SERVICE_BASE_URL:http://localhost:8081}
  call-timeout: 2s          # per-attempt timeout for the apply call (Reactor Mono.timeout)

# Resiliency on the Gateway → Account Service call. Composition (see AccountClient):
# retry ( circuit-breaker ( timeout ( call ) ) ) — retry drives attempts, the breaker
# records each attempt, and every attempt has its own timeout.
resilience4j:
  circuitbreaker:
    instances:
      accountService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50               # open when ≥50% of the window fails
        wait-duration-in-open-state: 5s          # cool-off before probing again
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
  retry:
    instances:
      accountService:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true         # 200ms → 400ms → 800ms
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true             # jitter, so retries don't sync up
        randomized-wait-factor: 0.5
        ignore-exceptions:
          # Don't waste retries when the breaker is already open — fail fast instead.
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException

management:
  tracing:
    sampling:
      probability: 1.0                   # trace every request (demo — see full path)
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, circuitbreakers, circuitbreakerevents
  health:
    circuitbreakers:
      enabled: true
